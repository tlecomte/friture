name: build

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  pull_request:

jobs:
  test-linux:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v5

    - name: Set up Python
      uses: actions/setup-python@v6

    - name: Install Qt and audio build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libxkbcommon-x11-0 \
          libxcb-xinerama0 \
          libasound2-dev \
          libjack-dev \
          libportaudio2

    - name: Run unit tests with coverage
      run: bash ./.github/workflows/test-linux.sh

  build-windows:
    if: false # Packaging builds disabled to save CI minutes; remove to re-enable.
    runs-on: windows-2022

    steps:
    - name: Checkout
      uses: actions/checkout@v5

    - name: Set up Python
      uses: actions/setup-python@v6

    - name: Display Python version
      run: python -c "import sys; print(sys.version)"

    - name: Inspect Build Environment
      shell: powershell
      run: Write-Host $env:PATH

    - name: Enable Visual Studio Developer Command Prompt
      uses: ilammy/msvc-dev-cmd@v1

    - name: Build
      shell: powershell
      run: ./.github/workflows/install-windows.ps1

    - name: Upload friture appx
      uses: actions/upload-artifact@v4
      with:
        name: friture-appx
        path: dist/friture-*.appx
        if-no-files-found: error

    - name: Upload friture msi
      uses: actions/upload-artifact@v4
      with:
        name: friture-msi
        path: dist/friture-*.msi
        if-no-files-found: error

    - name: Upload friture zip
      uses: actions/upload-artifact@v4
      with:
        name: friture-zip
        path: dist/friture.zip
        if-no-files-found: error

    - name: Upload import xref
      uses: actions/upload-artifact@v4
      with:
        name: friture-import-xref
        path: build/friture/xref-friture.html
        if-no-files-found: error

    - name: Upload import graph
      uses: actions/upload-artifact@v4
      with:
        name: friture-import-graph
        path: build/friture/graph-friture.dot
        if-no-files-found: error

  build-linux:
    if: false # Packaging builds disabled to save CI minutes; remove to re-enable.
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v5

    - name: Set up Python
      uses: actions/setup-python@v6

    - name: Display Python version
      run: python -c "import sys; print(sys.version)"

    - name: Build
      run: source ./.github/workflows/install-linux.sh

    - name: Upload appImage
      uses: actions/upload-artifact@v4
      with:
        name: friture-appImage
        path: friture*.AppImage
        if-no-files-found: error

  build-macos:
    if: false # Packaging builds disabled to save CI minutes; remove to re-enable.
    runs-on: macos-13

    steps:
    - name: Checkout
      uses: actions/checkout@v5

    - name: Set up Python
      uses: actions/setup-python@v6

    - name: Display Python version
      run: python -c "import sys; print(sys.version)"

    - name: Build
      run: source ./.github/workflows/install-macos.sh

    - name: Upload dmg
      uses: actions/upload-artifact@v4
      with:
        name: friture-dmg
        path: friture*.dmg
        if-no-files-found: error

  release:
    if: false # Depends on packaging builds; re-enable with build jobs.
    name: Create release and upload artifacts
    runs-on: ubuntu-latest
    needs: [build-windows, build-linux, build-macos]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download all workflow run artifacts
        uses: actions/download-artifact@v5

      - name: Display structure of downloaded files
        run: ls -R

      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/') # Limit releases to pushes to tags
        with:
          draft: true
          prerelease: false
          fail_on_unmatched_files: true
          files: |
            **/friture*.msi
            **/friture*.dmg
            **/friture*.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
